name: Fetch Transcripts

on:
  schedule:
    - cron: '0 3 * * 1'   # Mondays 3am UTC
  workflow_dispatch:
    inputs:
      slug:
        description: 'Channel slug to run (empty = all)'
        required: false
        default: ''
      limit:
        description: 'Max videos to fetch per channel (empty = all new)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      max-parallel: 1
      matrix:
        include:
          - slug: minuteearth
            url: https://www.youtube.com/@MinuteEarth/videos

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp==2026.03.17

      - name: Fetch new transcripts
        if: inputs.slug == '' || inputs.slug == matrix.slug
        run: ./scripts/fetch-channel.sh "${{ matrix.slug }}" "${{ matrix.url }}" "${{ inputs.limit }}"

      - name: Commit and push changes
        id: commit
        run: ./scripts/commit-changes.sh "${{ matrix.slug }}"

      - name: Update GitHub Release
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/update-release.sh "${{ matrix.slug }}"
